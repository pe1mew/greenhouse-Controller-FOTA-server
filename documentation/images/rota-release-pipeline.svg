<svg width="680" height="270" viewBox="0 0 680 270" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ROTA release pipeline</title>
  <desc>A GitHub release is pulled by ota-store-update.sh, verified and staged into the releases pool, then the soak channel pointer is updated automatically while mainstream is only pointed by a manual promote.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
      .th { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .box { fill: #FFFFFF; stroke: #888780; stroke-width: 0.75; }
      .arr { stroke: #5F5E5A; stroke-width: 1.5; }
    </style>
  </defs>
  <rect x="0" y="0" width="680" height="270" fill="#FDFCFA"/>

  <rect class="box" x="40" y="40" width="180" height="56" rx="8"/>
  <text class="th" x="130" y="58" text-anchor="middle" dominant-baseline="central">GitHub release</text>
  <text class="ts" x="130" y="76" text-anchor="middle" dominant-baseline="central">manifest + fw + assets</text>

  <rect class="box" x="270" y="40" width="180" height="56" rx="8"/>
  <text class="th" x="360" y="58" text-anchor="middle" dominant-baseline="central">ota-store-update.sh</text>
  <text class="ts" x="360" y="76" text-anchor="middle" dominant-baseline="central">cron · sha256 verify</text>

  <rect class="box" x="500" y="40" width="140" height="56" rx="8"/>
  <text class="th" x="570" y="58" text-anchor="middle" dominant-baseline="central">releases/&lt;v&gt;/</text>
  <text class="ts" x="570" y="76" text-anchor="middle" dominant-baseline="central">staged atomically</text>

  <line x1="224" y1="68" x2="266" y2="68" class="arr" marker-end="url(#arrow)"/>
  <line x1="454" y1="68" x2="496" y2="68" class="arr" marker-end="url(#arrow)"/>

  <rect x="270" y="160" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="360" y="178" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#085041">channels/soak.json</text>
  <text x="360" y="196" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">pointed automatically</text>

  <rect x="480" y="160" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
  <text x="560" y="178" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#3C3489">mainstream.json</text>
  <text x="560" y="196" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">manual promote</text>

  <line x1="360" y1="100" x2="360" y2="156" class="arr" marker-end="url(#arrow)"/>
  <line x1="454" y1="188" x2="476" y2="188" class="arr" marker-end="url(#arrow)"/>

  <rect x="200" y="238" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text class="ts" x="220" y="244" dominant-baseline="central">soak (staging)</text>
  <rect x="340" y="238" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
  <text class="ts" x="360" y="244" dominant-baseline="central">mainstream (production)</text>
</svg>
