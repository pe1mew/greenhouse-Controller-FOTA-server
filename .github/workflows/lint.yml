name: lint
on:
  push:
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP syntax check
        run: |
          set -e
          found=0
          while IFS= read -r -d '' f; do
            php -l "$f"
            found=1
          done < <(find . -name '*.php' -not -path './vendor/*' -print0)
          [ "$found" -eq 1 ] || { echo "no PHP files found"; exit 1; }
      - name: Credential-material scan (R-T07)
        run: |
          set -e
          if git ls-files | grep -E '\.(pem|key|crt|p12|secret)$|(^|/)\.deploy\.env$|(^|/)devices\.json$'; then
            echo "::error::credential-class file tracked in git — forbidden by R-T07"
            exit 1
          fi
          echo "credential scan clean"
