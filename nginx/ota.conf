# ROTA OTA endpoints — nginx server-block fragment (wire contract v1.0).
#
# TLS: the OTA vhost presents the PINNED self-signed certificate (TDS R-A02/R5).
# Certificate and key paths below are placeholders — the real files come from
# the operator's secret store and are installed on the VPS, never committed
# to this repository (R-T07).
#
# Include this fragment from the rfsee.net server block, or run the OTA
# endpoints as a dedicated server block on its own hostname/port.

# --- OTA endpoints (PHP) ------------------------------------------------
location /hbwv/ota/ {
    # only the two contract endpoints exist; everything else 404s
    location ~ ^/hbwv/ota/(manifest|download)\.php$ {
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass   unix:/run/php/php-fpm.sock;   # adjust to VPS PHP-FPM socket
    }
    return 404;
}

# --- internal artefact streaming (X-Accel-Redirect target) ---------------
# download.php authenticates, then issues:
#   X-Accel-Redirect: /ota-store-internal/releases/<version>/<file>
location /ota-store-internal/ {
    internal;
    alias /var/www/ota-store/;    # adjust: ota-store lives OUTSIDE the webroot
}
