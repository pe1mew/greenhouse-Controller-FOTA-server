# ROTA OTA endpoint — nginx server block (wire contract v1.0).
#
# Deployment model: this repo is cloned in $HOME on the VPS and DEPLOYED
# from there — tools/server-update.sh copies public/ into WEBROOT below.
# nginx never serves the clone, so .git/, tools/, nginx/ stay private.
#
# TLS: presents the PINNED self-signed certificate for ota.rfsee.net
# (TDS R-A02/R5). Cert/key paths point at the operator secret material
# installed on the VPS — never committed to this repo (R-T07).
#
# Adjust every /PLACEHOLDER/ path to the real VPS locations, then:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name ota.rfsee.net;

    ssl_certificate     /etc/ssl/rota/ota_server.pem;   # pinned self-signed cert
    ssl_certificate_key /etc/ssl/rota/ota_server.key;   # mode 0600, root only
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Web root = the DEPLOYED copy of public/ (server-update.sh syncs it
    # there from the clone in $HOME). Never point this at the clone itself.
    root /var/www/ota/public;        # = WEBROOT from .server.env

    # Defence in depth: never serve a dotfile/dir (blocks .git if the clone
    # is ever mis-placed inside the webroot).
    location ~ /\. { deny all; return 404; }

    # The two contract endpoints; everything else 404s.
    location = /hbwv/ota/manifest.php { try_files $uri =404; include snippets/rota-php.conf; }
    location = /hbwv/ota/download.php { try_files $uri =404; include snippets/rota-php.conf; }
    location / { return 404; }

    # Internal artefact streaming — download.php authenticates, then issues:
    #   X-Accel-Redirect: /ota-store-internal/releases/<version>/<file>
    location /ota-store-internal/ {
        internal;
        alias /var/www/ota-store/;    # ota-store lives OUTSIDE the webroot
    }
}

# snippets/rota-php.conf (install once on the VPS):
#   include        fastcgi_params;
#   fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
#   fastcgi_pass   unix:/run/php/php-fpm.sock;   # adjust to the VPS PHP-FPM socket
